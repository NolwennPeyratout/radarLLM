model:
  arch: radarllm_qformer
  model_type: pretrain

  load_finetuned: False
  load_pretrained: False
  pretrained: ""
  finetuned: ""

  # Radar geometry
  Z_rad: 200
  Y_rad: 8
  X_rad: 200
  latent_dim: 128

  # Radar encoder
  use_radar_occupancy_map: False
  use_rpn_radar: False

  # QFormer
  num_query_token: 32
  qformer_text_input: True
  max_txt_len: 128
  embed_dim: 256

  # Optional pretrained initializations
  load_qformer_pretrained: False
  qformer_pretrained: ""

  load_voxelnet_pretrained: False
  voxelnet_pretrained: "/home/renault/repo/radarllm/model_checkpoints/BEVCar/BEVCar_model-000050000.pth"

  # ---------- Debug / diagnostics ----------
  # Set to True to log voxel IoU, BEV histograms and embedding diversity every forward pass.
  # Disable for production runs (adds CPU overhead).
  debug_radar_diversity: False

  # ---------- Loss weights ----------
  # Keep ITM weight low at start so ITC learns first; increase once margin>0.1.
  itm_loss_weight: 2

preprocess:
  vis_processor:
    train:
      name: "blip2_image_train"
      image_size: 224
    eval:
      name: "blip2_image_eval"
      image_size: 224
  text_processor:
    train:
      name: "blip_caption"
    eval:
      name: "blip_caption"
