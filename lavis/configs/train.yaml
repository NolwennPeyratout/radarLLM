# model name
exp_name: 'BEVCar'

# Training parameters
max_iters: 75000
log_freq: 100
shuffle: true
dset: 'mini'
save_freq: 1000
batch_size: 8
grad_acc: 5
lr: 0.0003
use_scheduler: true
weight_decay: 0.0000001
nworkers: 2

# Directories
data_dir: '/home/renault/repo/radarllm/dataset/'
custom_dataroot: 'datasets/scaled_images'
log_dir: 'logs_nuscenes'
ckpt_dir: 'model_checkpoints'
keep_latest: 75
init_checkpoint: '/home/renault/repo/radarllm/model_checkpoints/BEVCar/BEVCar_model-000050000.pth'
ignore_load: null
load_step: 5000
load_optimizer: true
load_scheduler: true

# Data parameters
final_dim: [448, 896]  # to match //8, //14, //16 and //32 in Vit
rand_flip: true
rand_crop_and_resize: true
ncams: 6
nsweeps: 5

# Model parameters encoder
#encoder_type: 'dino_v2'
radar_encoder_type: 'voxel_net'
radar_encoder_freeze: true
use_rpn_radar: false
#train_task: 'both'
use_radar: true
use_radar_filters: false
use_radar_encoder: true
use_metaradar: false
use_shallow_metadata: true
use_pre_scaled_imgs: false
use_obj_layer_only_on_map: true
init_query_with_image_feats: true
do_rgbcompress: true
do_shuffle_cams: true
#use_multi_scale_img_feats: true
num_layers: 6

#From lavis files NEED TO CHANGE

arch: pretrain_qwen2_5_3B
load_finetuned: False

#pretrained: "/home/renault/repo/LAVIS/models/blip2_pretrained_flant5xl.pth"
finetuned: ""

# Q-Former
num_query_token: 32

#transformer model to use in the final architecture
qwen_model: "/home/renault/repo/models/Qwen2.5-3B-Instruct"
max_new_tokens: 512
freeze_qwen: true

# generation configs
prompt: ""

device_ids: [0,1]
freeze_dino: true
do_feat_enc_dec: true
combine_feat_init_w_learned_q: true
model_type: 'transformer'
use_radar_occupancy_map: false
learnable_fuse_query: true

# wandb
group: 'BEVCar'
notes: 'BEVCar model: radar encoding, DINO as image backbone, fusion and lifting based on transformer,
6 blocks, radar init, image init, multiscale feats, enc-dec, radar as query for fusion,
with learnable queries'
name: 'BEVCar'
